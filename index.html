    // Convertir string "dd/mm/yyyy" a Date
function parseFecha(f) {
    const [d, m, y] = f.split("/").map(Number);
    return new Date(y, m - 1, d);
}

// Obtener fechas únicas convertidas a Date
const fechasDate = [...new Set(turnos.map(t => t.FECHA))]
    .map(parseFecha)
    .sort((a, b) => a - b);

// Obtener min y max
const minFecha = fechasDate[0];
const maxFecha = fechasDate[fechasDate.length - 1];

// Generar rango completo
const fechas = [];
let actual = new Date(minFecha);

while (actual <= maxFecha) {
    const d = String(actual.getDate());
    const m = String(actual.getMonth() + 1).padStart(2, "0");
    const y = actual.getFullYear();

    fechas.push(`${d}/${m}/${y}`);

    actual.setDate(actual.getDate() + 1);
}


    // 🔹 agrupar por médico y fecha
    const medicos = {};

    turnos.forEach(t => {

        if(!medicos[t.DNIMEDICO]){
            medicos[t.DNIMEDICO] = {
                
                dni: t.DNIMEDICO,
                nombre: t.MEDICO,
                apellidos: t.Apellidos,
                nombres: t.Nombres,
                especialidad: t.Especialidad,
                escuela: t.ESCUELA,
                colegiatura: t.NROCOLEGIATURA,
                dias: {}
            };
        }

        if(!medicos[t.DNIMEDICO].dias[t.FECHA]){
            medicos[t.DNIMEDICO].dias[t.FECHA] = [];
        }

        medicos[t.DNIMEDICO].dias[t.FECHA].push({
            inicio: t.HORIN.substring(0,5),
            fin: t.HORFIN.substring(0,5)
        });

    });

    // 🔹 ordenar horas
    Object.values(medicos).forEach(m => {
        Object.values(m.dias).forEach(lista => {
            lista.sort((a,b) => a.inicio.localeCompare(b.inicio));
        });
    });

    let data = [];
    //HEADER0
    let header0=[
        ""
    ];

    // 🔥 HEADER
    let header1 = [
        "IPRESS","","","PROFESIONAL DE SALUD","","","","","","",""
    ];

    fechas.forEach(f => {
        header1.push(f);
        header1.push("");
    });

    data.push(header1);

    let header2 = ["CÓDIGO_ÚNICO","NOMBRE","RED","TIPO DE DOCUMENTO","NUMERO DE DOCUMENTO","COLEGIO","COLEGIATURA",
        "APELLIDOS","NOMBRES","ESPECIALIDAD","SERVICIO"];
    fechas.forEach(() => {
        header2.push("HORA INICIO");
        header2.push("HORA FIN");
    });

    data.push(header2);

    // 🔥 FILAS CORRECTAS
    Object.values(medicos).forEach(m => {

        /*let [apellidos, nombres] = m.nombre.split(",");*/

        // máximo turnos en cualquier día
        let maxTurnos = Math.max(
            ...Object.values(m.dias).map(lista => lista.length)
        );

        for(let i = 0; i < maxTurnos; i++){

            let row = [
                "00009153",
                "CLINICA MONTEFIORI",
                "NO PERTENECE A NINGUNA RED",
                "DNI",
                m.dni,
                m.escuela,
                m.colegiatura,  
                m.apellidos,
                m.nombres,
                m.especialidad,
                "UPSS - CONSULTA EXTERNA"
            ];

            fechas.forEach(f => {

                if(m.dias[f] && m.dias[f][i]){
                    row.push(m.dias[f][i].inicio);
                    row.push(m.dias[f][i].fin);
                } else {
                    row.push("");
                    row.push("");
                }

            });

            data.push(row);
        }

    });

    const ws = XLSX.utils.aoa_to_sheet(data);

    // 🔥 merge fechas
    ws['!merges'] = [];

    ws['!merges'].push({
            s: { r: 0, c: 0 },
            e: { r: 0, c: 2 }
        });
    ws['!merges'].push({
            s: { r: 0, c: 3 },
            e: { r: 0, c: 10 }
        });
    fechas.forEach((f, i) => {
        ws['!merges'].push({
            s: { r: 0, c: 11 + (i*2) },
            e: { r: 0, c: 12 + (i*2) }
        });
    });

    // 🔥 estilos
    const range = XLSX.utils.decode_range(ws['!ref']);

    for(let R = range.s.r; R <= range.e.r; ++R) {
        for(let C = range.s.c; C <= range.e.c; ++C) {

            const cellRef = XLSX.utils.encode_cell({ r: R, c: C });
            if(!ws[cellRef]) continue;

            ws[cellRef].s = {//ACA ES s de style parece, asegura
                alignment: {
                    horizontal: "center",
                    vertical: "center"/*,
                    wrapText: true*/
                },
                border: {
                    top: {style:"thin"},
                    bottom: {style:"thin"},
                    left: {style:"thin"},
                    right: {style:"thin"}
                },
                font: { name: "Arial", sz: 10 }
            };

            if(R ===1 && C>=0 && C<=2){
                ws[cellRef].s.fill = { fgColor: { rgb: "FFF2CC" } };
                
            }

            if(R ===1 && C>=3 && C<=10){
                ws[cellRef].s.fill = { fgColor: { rgb: "FCE4D6" } };
                
            }

            if(R === 0 && C>=0 && C<=2){
                ws[cellRef].s.fill = { fgColor: { rgb: "F4B400" } };
                /*ws[cellRef].s.font = { bold: true };*/
            }

            if(R === 0 && C>=3 && C<=10){
                ws[cellRef].s.fill = { fgColor: { rgb: "F4B400" } };
                /*ws[cellRef].s.font = { bold: true };*/
            }

            if(R === 0 && C>=11){
                ws[cellRef].s.fill = { fgColor: { rgb: "1591EA" } };
                ws[cellRef].s.font = { bold: true , color: { rgb: "FFFFFF" } };
            }

            /*if(R === 0){
                ws[cellRef].s.fill = { fgColor: { rgb: "FFC000" } };
                ws[cellRef].s.font = { bold: true };
            }*/

            if(R === 1 && C>=11){
                ws[cellRef].s.fill = { fgColor: { rgb: "D9D9D9" } };
                ws[cellRef].s.font = { bold: true };
            }
        }
    }

    ws['!cols'] = [
        { wch: 10 },
        { wch: 12 },
        { wch: 10 },
        { wch: 12 },
        { wch: 22 },
        { wch: 18 },
        { wch: 18 },
        { wch: 25 },
        ...fechas.flatMap(() => [{ wch: 11 }, { wch: 11 }])
    ];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Turnos");

    XLSX.writeFile(wb, "SUSALUD.xlsx");
}

        inicio: t.HORIN.substring(0,5),
        fin: t.HORFIN.substring(0,5)
    });
});

// 🔹 ORDENAR TURNOS POR HORA
Object.values(medicos).forEach(m => {
    Object.values(m.dias).forEach(lista => {
        lista.sort((a,b) => a.inicio.localeCompare(b.inicio));
    });
});

// 🔹 OBTENER FECHAS ORDENADAS
const fechas = [...new Set(turnos.map(t => t.FECHA))]
.sort((a,b) => {
    const [d1,m1,y1] = a.split("/").map(Number);
    const [d2,m2,y2] = b.split("/").map(Number);
    return new Date(y1, m1-1, d1) - new Date(y2, m2-1, d2);
});

// 🔹 CREAR TABLA
const tabla = document.getElementById("tabla");

// encabezado
let head = `<tr>
    <th>CÓDIGO_ÚNICO</th>
    <th>NOMBRE</th>
    <th>RED</th>
    <th>TIPO DE DOCUMENTO</th>

<th>NÚMERO DE DOCUMENTO</th>
<th>COLEGIO PROFESIONAL</th>
<th>NÚMERO DE COLEGIATURA</th>
<th>APELLIDOS</th>
<th>NOMBRES</th>
<th>ESPECIALIDAD</th>
<th>SERVICIO</th>

`;

fechas.forEach(f => {
    head += `<th>${f}</th>`;
});

head += "</tr>";

tabla.innerHTML = head;

// 🔹 FILAS
Object.values(medicos).forEach(m => {

    let fila = `<tr>
        <td>00009153</td>
        <td>CLINICA MONTEFIORI</td>
        <td>NO PERTENECE A NINGUNA RED</td>
        <td>DNI</td>
        <td>${m.dni}</td>
        <td>${m.ESCUELAMED}</td>
        <td>${m.NROCOLEGIATURAMED}</td>
        <td>${m.apellidos}</td>
        <td>${m.nombres}</td>
        <td>${m.especialidad}</td>
        <td>UPSS - CONSULTA EXTERNA</td>
        
        
        
    `;

    fechas.forEach(f => {

        if(m.dias[f]){
            let contenido = "";

            m.dias[f].forEach(t => {
                contenido += `<div class="turno">${t.inicio} - ${t.fin}</div>`;
            });

            fila += `<td>${contenido}</td>`;
        } else {
            fila += `<td></td>`;
        }
    });

    fila += "</tr>";
    tabla.innerHTML += fila;
});

</script>
